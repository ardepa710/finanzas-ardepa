# ─────────────────────────────────────────────
#  FINANZAS ARDEPA — Docker Compose
#  Servicios: web, bot
#  Base de datos: Neon.tech (externo)
#  Migraciones: correr manualmente con prisma migrate deploy
# ─────────────────────────────────────────────

services:

  # ── App Web (Next.js) ────────────────────────
  web:
    build: .
    restart: unless-stopped
    command: npm start
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requerida en .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY requerido en .env}
    networks:
      - finanzas-net
      - nginx-proxy

  # ── Bot Telegram (polling) ───────────────────
  bot:
    build: .
    restart: unless-stopped
    command: npm run bot
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requerida en .env}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN requerido en .env}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:?TELEGRAM_ALLOWED_CHAT_ID requerido en .env}
    networks:
      - finanzas-net
      - nginx-proxy

networks:
  finanzas-net:
    driver: bridge
  nginx-proxy:
    external: true
